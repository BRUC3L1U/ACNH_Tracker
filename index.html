<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACNH Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-primary:#7BC47F;--color-primary-dark:#5aa460;
  --color-bg:#F5F0E8;--color-surface:#FFFDF7;
  --color-accent-warm:#F4A460;--color-accent-cool:#87CEEB;
  --color-text:#3D2B1F;--color-text-muted:#8B7355;
  --color-collected:#5aa460;--color-border:#d4c5a9;
  --color-danger:#e07050;--color-shadow:rgba(0,0,0,.08);
  --radius-card:12px;--radius-sm:6px;--font-body:'Noto Sans SC',sans-serif;
}
body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);min-height:100vh}

.navbar{position:sticky;top:0;z-index:100;background:var(--color-surface);border-bottom:2px solid var(--color-primary);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;box-shadow:0 2px 8px var(--color-shadow);gap:8px}
.nav-left{display:flex;align-items:center;gap:8px;min-width:0;flex-shrink:1}
.nav-title{font-size:clamp(13px,2.5vw,16px);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-tabs{display:flex;gap:4px;flex-shrink:0}
.nav-tab{padding:8px 14px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--color-text-muted);cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;white-space:nowrap}
.nav-tab:hover{background:var(--color-bg)}
.nav-tab.active{background:var(--color-primary);color:#fff}

.main{padding:16px;max-width:1100px;margin:0 auto}

.progress-section{background:var(--color-surface);border-radius:var(--radius-card);padding:16px 20px;margin-bottom:16px;box-shadow:0 2px 8px var(--color-shadow)}
.progress-text{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.progress-label{font-weight:600;font-size:15px}
.progress-pct{font-size:20px;font-weight:700;color:var(--color-primary-dark)}
.progress-bar{height:12px;background:var(--color-bg);border-radius:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--color-primary),var(--color-primary-dark));border-radius:6px;transition:width .4s ease}
.data-bar{display:flex;gap:8px;justify-content:flex-end;margin-bottom:16px}
.data-btn{padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted);cursor:pointer;font-size:13px;transition:all .15s;box-shadow:0 2px 8px var(--color-shadow)}
.data-btn:hover{border-color:var(--color-primary);color:var(--color-primary)}

.today-panel{background:var(--color-surface);border-radius:var(--radius-card);margin-bottom:16px;box-shadow:0 2px 8px var(--color-shadow);overflow:hidden}
.today-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;cursor:pointer;user-select:none;border-bottom:1px solid transparent}
.today-header:hover{background:var(--color-bg)}
.today-header.open{border-bottom-color:var(--color-border)}
.today-header h3{font-size:15px;display:flex;align-items:center;gap:8px}
.today-header .arrow{transition:transform .2s;font-size:12px}
.today-header.open .arrow{transform:rotate(90deg)}
.today-body{display:none;padding:16px 20px}
.today-body.open{display:block}
.today-info{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:12px;font-size:14px}
.hemi-btn{padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--color-primary);background:transparent;color:var(--color-primary);cursor:pointer;font-size:13px;transition:all .2s}
.hemi-btn.active{background:var(--color-primary);color:#fff}
.today-list h4{font-size:14px;margin:8px 0 6px;color:var(--color-primary-dark)}
.today-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;flex-wrap:wrap}
.today-item .warn{color:var(--color-danger);font-size:12px;font-weight:500}

.filter-bar{background:var(--color-surface);border-radius:var(--radius-card);padding:16px 20px;margin-bottom:16px;box-shadow:0 2px 8px var(--color-shadow)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:13px;font-weight:600;color:var(--color-text-muted);min-width:60px}
.filter-options{display:flex;flex-wrap:wrap;gap:4px}
.filter-btn{padding:5px 10px;border-radius:var(--radius-sm);border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text);cursor:pointer;font-size:13px;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--color-primary)}
.filter-btn.active{background:var(--color-primary);border-color:var(--color-primary);color:#fff}
.filter-btn.month-grid{width:34px;text-align:center;padding:5px 0}
.month-current{border-color:var(--color-accent-warm)!important}
.filter-search{flex:1;min-width:120px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text);font-size:13px;outline:none}
.filter-search:focus{border-color:var(--color-primary)}
.filter-reset{padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--color-danger);background:transparent;color:var(--color-danger);cursor:pointer;font-size:13px;transition:all .15s}
.filter-reset:hover{background:var(--color-danger);color:#fff}
.filter-toggle-btn{display:none;width:100%;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--color-primary);background:var(--color-surface);color:var(--color-primary);cursor:pointer;font-size:14px;font-weight:600}
.filter-panel{display:block}
@media(max-width:640px){
  .filter-toggle-btn{display:block}
  .filter-panel{display:none;padding-top:12px}
  .filter-panel.open{display:block}
  .navbar{padding:0 8px}
  .nav-tab{padding:8px 6px;font-size:12px}
  .nav-title{font-size:11px}
  .heat-cell{width:20px;height:18px;font-size:9px}
  .heat-cell-hour{width:15px;height:15px;font-size:8px}
  .meta-row{flex-wrap:wrap;row-gap:4px}
}

.list-section{background:var(--color-surface);border-radius:var(--radius-card);overflow:hidden;box-shadow:0 2px 8px var(--color-shadow)}
.list-header{display:flex;align-items:center;padding:10px 16px;border-bottom:2px solid var(--color-border);font-size:13px;font-weight:600;color:var(--color-text-muted);gap:8px}
.list-header .sortable{cursor:pointer;user-select:none;transition:color .2s}
.list-header .sortable:hover{color:var(--color-primary)}
.creature-item{display:grid;grid-template-columns:32px 1fr auto;align-items:start;padding:14px 16px;border-bottom:1px solid var(--color-border);transition:opacity .3s,background .2s;gap:8px 12px;cursor:pointer}
.creature-item:hover{background:var(--color-bg)}
.creature-item.collected{opacity:.5;background:rgba(90,164,96,.08)}
.creature-item.collected .check-box{background:var(--color-collected);border-color:var(--color-collected)}
.creature-item.collected .check-box::after{opacity:1}
.creature-main{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0}
.creature-name{font-weight:600;font-size:15px;white-space:nowrap}
.tag{padding:2px 8px;border-radius:10px;font-size:12px;white-space:nowrap}
.tag-location{background:var(--color-accent-cool);color:#2a4a5a}
.tag-shadow{background:var(--color-accent-warm);color:#5a3a1a}
.tag-price{color:var(--color-text-muted);font-weight:700;font-size:13px;white-space:nowrap}
.check-box{width:28px;height:28px;border-radius:var(--radius-sm);border:2px solid var(--color-border);display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0;margin-top:2px}
.check-box::after{content:'\2713';color:#fff;font-size:16px;opacity:0;transition:opacity .3s;font-weight:700}
.creature-meta{grid-column:1/-1;display:flex;flex-direction:column;gap:4px}
.meta-row{font-size:11px;color:var(--color-text-muted);display:flex;align-items:center;gap:2px}
.heat-cell{width:22px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:3px;font-size:10px;background:var(--color-bg);color:var(--color-text-muted);transition:all .15s}
.heat-cell.on{background:var(--color-primary);color:#fff}
.heat-cell.current{border:2px solid var(--color-accent-warm)}
.heat-cell-hour{width:18px;height:18px;font-size:9px}
.empty-state{padding:40px;text-align:center;color:var(--color-text-muted);font-size:15px}
</style>
</head>

function loadCollected() {
  try {
    const s = localStorage.getItem('acnh_collected');
    if (s) return new Set(JSON.parse(s));
  } catch {}
  // Migrate from the legacy cookie (one-time), then clear it.
  const m = document.cookie.split(';').find(c => c.trim().startsWith('acnh_collected='));
  if (m) {
    try {
      const arr = JSON.parse(decodeURIComponent(m.split('=').slice(1).join('=')));
      const set = new Set(arr);
      try { localStorage.setItem('acnh_collected', JSON.stringify(arr)); } catch {}
      document.cookie = 'acnh_collected=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;SameSite=Lax';
      return set;
    } catch {}
  }
  return new Set();
}

function saveCollected() {
  try { localStorage.setItem('acnh_collected', JSON.stringify([...state.collected])); } catch {}
}

function exportCollected() {
  const data = { version: 1, collected: [...state.collected] };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'acnh-collected.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importCollected(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const arr = Array.isArray(parsed) ? parsed : parsed.collected;
      if (!Array.isArray(arr)) throw new Error('文件格式不正确');
      state.collected = new Set(arr);
      saveCollected();
      renderAll();
      alert('导入成功，共 ' + state.collected.size + ' 条记录');
    } catch (err) {
      alert('导入失败：' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function saveHemisphere() {

}

function getLocalTime() { return new Date(); }

function isAvailableNow(item) {
  const now = getLocalTime();
  const month = now.getMonth() + 1;
  const hour = now.getHours();
  const months = state.hemisphere === 'north' ? item.northMonths : item.southMonths;
  return months.includes(month) && item.hours.includes(hour);
}

function isLeavingNextMonth(item) {
  const now = getLocalTime();
  const month = now.getMonth() + 1;
  const nextMonth = month === 12 ? 1 : month + 1;
  const months = state.hemisphere === 'north' ? item.northMonths : item.southMonths;
  return months.includes(month) && !months.includes(nextMonth);
}

function getTimeRangeLabel(hours) {
  if (hours.length === 24) return '全天';
  var r = [];
  var s = hours[0], e = hours[0];
  for (var i = 1; i < hours.length; i++) {
    if (hours[i] === e + 1) { e = hours[i]; }
    else { r.push(s === e ? s + '时' : s + '-' + e + '时'); s = hours[i]; e = hours[i]; }
  }
  r.push(s === e ? s + '时' : s + '-' + e + '时');
  return r.join(' / ');
}

function applyFilters(data, tab) {
  let items = [...data];
  const f = state.filters[tab];

  if (f.search) {
    const s = f.search.toLowerCase();
    items = items.filter(x => x.name.toLowerCase().includes(s));
  }

  if (tab === 'fish' || tab === 'bug') {
    if (f.location.length > 0) items = items.filter(x => f.location.includes(x.location));
  }
  if (tab === 'fish' || tab === 'sea') {
    if (f.shadowSize.length > 0) items = items.filter(x => f.shadowSize.includes(x.shadowSize));
  }
  if (tab === 'bug') {
    if (f.weather && f.weather.length > 0) items = items.filter(x => f.weather.includes(x.weather));
  }
  if (f.month !== null) {
    const m = f.month;
    items = items.filter(x => {
      const months = state.hemisphere === 'north' ? x.northMonths : x.southMonths;
      return months.includes(m);
    });
  }
  if (f.hour !== null) {
    if (f.hour === 'all') {
      items = items.filter(x => x.hours.length === 24);
    } else {
      items = items.filter(x => x.hours.includes(f.hour));
    }
  }
  if (f.status === 'collected') items = items.filter(x => state.collected.has(x.id));
  if (f.status === 'uncollected') items = items.filter(x => !state.collected.has(x.id));

  const sk = state.sort.key;
  const sd = state.sort.dir === 'asc' ? 1 : -1;
  if (sk) {
    items.sort((a, b) => {
      if (sk === 'name') return sd * a.name.localeCompare(b.name, 'zh');
      if (sk === 'price') return sd * (a.price - b.price);
      if (sk === 'collected') {
        const ca = state.collected.has(a.id) ? 1 : 0;
        const cb = state.collected.has(b.id) ? 1 : 0;
        return sd * (ca - cb);
      }
      if (sk === 'rarity') {
        const ma = state.hemisphere==='north'?a.northMonths.length:a.southMonths.length;
        const mb = state.hemisphere==='north'?b.northMonths.length:b.southMonths.length;
        return sd * (ma - mb);
      }
      return 0;
    });
  }

  return items;
}

  let html = '<button class="filter-toggle-btn" id="filterToggle">🔍 筛选条件</button>';
  html += '<div class="filter-panel'+(state.filterOpen?' open':'')+'">';

  html += '<div class="filter-row"><span class="filter-label">半球</span><div class="filter-options">';
  html += '<button class="filter-btn'+(state.hemisphere==='north'?' active':'')+'" data-hemi="north">北半球</button>';
  html += '<button class="filter-btn'+(state.hemisphere==='south'?' active':'')+'" data-hemi="south">南半球</button>';
  html += '</div></div>';

  html += '<div class="filter-row"><span class="filter-label">收集状态</span><div class="filter-options">';
  for (const [val,label] of [['all','全部'],['uncollected','未收集'],['collected','已收集']]) {
    html += '<button class="filter-btn'+(f.status===val?' active':'')+'" data-filter="status" data-value="'+val+'">'+label+'</button>';
  }
  html += '</div></div>';

  if (tab === 'fish' || tab === 'bug') {
    html += '<div class="filter-row"><span class="filter-label">出现场所</span><div class="filter-options">';
    locations.forEach(loc => {
      html += '<button class="filter-btn'+(f.location.includes(loc)?' active':'')+'" data-filter="location" data-value="'+loc.replace(/"/g,'&quot;')+'">'+loc+'</button>';
    });
    html += '</div></div>';
  }

  if (tab !== 'bug') {
    html += '<div class="filter-row"><span class="filter-label">'+(tab==='sea'?'影子大小':'鱼影尺寸')+'</span><div class="filter-options">';
    shadows.forEach(s => {
      html += '<button class="filter-btn'+(f.shadowSize.includes(s)?' active':'')+'" data-filter="shadowSize" data-value="'+s+'">'+s+'</button>';
    });
    html += '</div></div>';
  }

  if (tab === 'bug') {
    html += '<div class="filter-row"><span class="filter-label">天气条件</span><div class="filter-options">';
    weathers.forEach(w => {
      html += '<button class="filter-btn'+(f.weather.includes(w)?' active':'')+'" data-filter="weather" data-value="'+w+'">'+w+'</button>';
    });
    html += '</div></div>';
  }

  html += '<div class="filter-row"><span class="filter-label">出现月份</span><div class="filter-options" id="monthGrid">';
  const curMon = getLocalTime().getMonth() + 1;
  for (let m = 1; m <= 12; m++) {
    html += '<button class="filter-btn month-grid'+(f.month===m?' active':'')+(m===curMon?' month-current':'')+'" data-filter="month" data-value="'+m+'">'+m+'</button>';
  }
  html += '</div></div>';

  html += '<div class="filter-row"><span class="filter-label">出现时间</span><div class="filter-options" id="hourGrid">';
  const curHr = getLocalTime().getHours();
  html += '<button class="filter-btn'+(f.hour==='all'?' active':'')+'" data-filter="hour" data-value="all">全天</button>';
  for (let h = 0; h < 24; h++) {
    html += '<button class="filter-btn'+(f.hour===h?' active':'')+(h===curHr?' month-current':'')+'" data-filter="hour" data-value="'+h+'">'+h+'</button>';
  }
  html += '</div></div>';

  html += '<div class="filter-row"><span class="filter-label">搜索</span>';
  html += '<input class="filter-search" id="filterSearch" type="text" placeholder="按名称模糊搜索..." value="'+f.search.replace(/"/g,'&quot;')+'">';
  html += '<button class="filter-reset" id="filterReset">重置全部</button>';
  html += '</div></div>';

  document.getElementById('filterBar').innerHTML = html;

  document.getElementById('filterToggle').addEventListener('click', () => {
    state.filterOpen = !state.filterOpen;
    renderFilters();
  });

  document.querySelectorAll('#filterBar .filter-btn[data-hemi]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.hemisphere = btn.dataset.hemi;
      saveHemisphere();
      renderAll();
    });
  });

  document.querySelectorAll('#filterBar .filter-btn[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      const filter = btn.dataset.filter;
      const value = btn.dataset.value;
      if (filter === 'status') {
        state.filters[tab].status = value;
      } else if (filter === 'location') {
        const arr = state.filters[tab].location;
        const idx = arr.indexOf(value);
        idx >= 0 ? arr.splice(idx,1) : arr.push(value);
      } else if (filter === 'shadowSize') {
        const arr = state.filters[tab].shadowSize;
        const idx = arr.indexOf(value);
        idx >= 0 ? arr.splice(idx,1) : arr.push(value);
      } else if (filter === 'weather') {
        const arr = state.filters[tab].weather;
        const idx = arr.indexOf(value);
        idx >= 0 ? arr.splice(idx,1) : arr.push(value);
      } else if (filter === 'month') {
        state.filters[tab].month = state.filters[tab].month === parseInt(value) ? null : parseInt(value);
      } else if (filter === 'hour') {
        if (value === 'all') {
          state.filters[tab].hour = state.filters[tab].hour === 'all' ? null : 'all';
        } else {
          state.filters[tab].hour = state.filters[tab].hour === parseInt(value) ? null : parseInt(value);
        }
      }
      renderFilters();
      renderList();
    });
  });

  document.getElementById('filterSearch').addEventListener('input', function() {
    state.filters[tab].search = this.value;
    renderList();
  });

  document.getElementById('filterReset').addEventListener('click', () => {
    state.filters[tab] = { location:[], shadowSize:[], weather:[], month:null, hour:null, status:'all', search:'' };
    renderFilters();
    renderList();
  });
}

function renderList() {
  const tab = state.activeTab;
  const data = DATA_MAP[tab];
  const filtered = applyFilters(data, tab);

  let html = '<div class="list-header">';
  const sortKeys = [{key:'name',label:'名称'},{key:'price',label:'价格'},{key:'collected',label:'收集'},{key:'rarity',label:'稀有度'}];
  sortKeys.forEach(sk => {
    const arrow = state.sort.key === sk.key ? (state.sort.dir==='asc'?' ▲':' ▼') : '';
    html += '<span class="sortable" data-sort="'+sk.key+'">'+sk.label+'</span><span style="font-size:10px">'+arrow+'</span> ';
  });
  html += '<span style="flex:1"></span>';
  html += '<span style="font-size:12px;color:var(--color-text-muted)">共 '+filtered.length+' 条</span>';
  html += '</div>';

  if (filtered.length === 0) {
    html += '<div class="empty-state">没有符合条件的生物，请调整筛选条件 🔍</div>';
  }

  filtered.forEach(item => {
    const collected = state.collected.has(item.id);
    html += '<div class="creature-item'+(collected?' collected':'')+'" data-id="'+item.id+'">';
    html += '<div class="check-box"></div>';
    html += '<div class="creature-main">';
    html += '<span class="creature-name">'+item.name+'</span>';
    html += '<span class="tag tag-location">'+item.location+'</span>';
    if (item.shadowSize) {
      html += '<span class="tag tag-shadow">'+item.shadowSize+'</span>';
    }
    html += '<span class="tag-price">'+item.price+' 铃钱</span>';
    html += '</div>';

    html += '<div class="creature-meta">';
    html += '<div class="meta-row"><span style="min-width:40px;font-size:11px">月:</span>';
    const months = state.hemisphere === 'north' ? item.northMonths : item.southMonths;
    const curMon = getLocalTime().getMonth() + 1;
    for (let m = 1; m <= 12; m++) {
      html += '<span class="heat-cell'+(months.includes(m)?' on':'')+(m===curMon?' current':'')+'">'+m+'</span>';
    }
    html += '</div>';
    html += '<div class="meta-row"><span style="min-width:40px;font-size:11px">时:</span>';
    const curHr = getLocalTime().getHours();
    for (let h = 0; h < 24; h++) {
      html += '<span class="heat-cell heat-cell-hour'+(item.hours.includes(h)?' on':'')+(h===curHr?' current':'')+'">'+h+'</span>';
    }
    html += '</div></div>';
    html += '</div>';
  });

  document.getElementById('listSection').innerHTML = html;

  document.querySelectorAll('.sortable').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.sort;
      if (state.sort.key === key) {
        state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sort.key = key;
        state.sort.dir = 'asc';
      }
      renderList();
    });
  });

  document.querySelectorAll('.creature-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      if (state.collected.has(id)) {
        state.collected.delete(id);
        el.classList.remove('collected');
      } else {
        state.collected.add(id);
        el.classList.add('collected');
      }
      saveCollected();
      renderProgress();
      // When a status filter or collected-sort is active, the item must
      // (dis)appear or reorder — fall back to a list rebuild. Otherwise the
      // in-place class toggle above is enough and avoids losing scroll/focus.
      const f = state.filters[state.activeTab];
      if (f.status !== 'all' || state.sort.key === 'collected') {
        renderList();
      }
    });
  });
}

function renderAll() {
  renderNavTabs();
  renderProgress();
  renderTodayPanel();
  renderFilters();
  renderList();
}

function renderDataBar() {
  document.getElementById('dataBar').innerHTML =
    '<button class="data-btn" id="exportBtn">导出收集记录</button>' +
    '<button class="data-btn" id="importBtn">导入收集记录</button>' +
    '<input type="file" id="importFile" accept="application/json" style="display:none">';
  document.getElementById('exportBtn').addEventListener('click', exportCollected);
  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', importCollected);
}

document.getElementById('navTabs').addEventListener('click', e => {
  const btn = e.target.closest('.nav-tab');
  if (!btn) return;
  state.activeTab = btn.dataset.tab;
  state.filterOpen = false;
  renderAll();
});

let lastTickMinute = null;
let lastTickHour = null;
setInterval(() => {
  const now = getLocalTime();
  const minute = now.getMinutes();
  const hour = now.getHours();
  // Re-render the today panel only when the minute actually changed; the
  // interval can fire late or the tab may be backgrounded, so guard against
  // no-op rebuilds that destroy/rebind DOM for nothing.
  if (minute !== lastTickMinute) {
    lastTickMinute = minute;
    renderTodayPanel();
  }
  // When the hour rolls over, the list's current-hour highlight goes stale —
  // refresh it too (month boundary handled by getDate in the panel render).
  if (hour !== lastTickHour) {
    lastTickHour = hour;
    renderList();
  }
}, 60000);

renderDataBar();
renderAll();
</script>
</body>
</html>
